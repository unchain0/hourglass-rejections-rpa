name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build binaries
      run: |
        GOOS=linux GOARCH=amd64 go build -o rpa-linux-amd64 ./cmd/rpa
        GOOS=linux GOARCH=arm64 go build -o rpa-linux-arm64 ./cmd/rpa
        GOOS=darwin GOARCH=amd64 go build -o rpa-darwin-amd64 ./cmd/rpa
        GOOS=darwin GOARCH=arm64 go build -o rpa-darwin-arm64 ./cmd/rpa
        GOOS=windows GOARCH=amd64 go build -o rpa-windows-amd64.exe ./cmd/rpa

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          rpa-linux-amd64
          rpa-linux-arm64
          rpa-darwin-amd64
          rpa-darwin-arm64
          rpa-windows-amd64.exe
        generate_release_notes: true
        draft: false
        prerelease: false
